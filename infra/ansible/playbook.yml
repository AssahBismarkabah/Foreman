---
# Foreman Deployment Playbook
#
# Configures an EC2 instance to run the Foreman orchestrator.
# Assumes Terraform has already provisioned the infrastructure.
#
# Usage:
#   export FOREMAN_HOST=$(terraform -chdir=../terraform output -raw instance_public_ip)
#   ansible-playbook -i inventory.yml playbook.yml
#
# Or with dynamic inventory:
#   ansible-playbook -i ../terraform-inventory.py playbook.yml

- name: Configure Foreman instance
  hosts: foreman
  become: yes
  gather_facts: yes

  vars_files:
    - "{{ lookup('env', 'FOREMAN_VARS_FILE') | default('vars/production.yml', true) }}"

  pre_tasks:
    - name: Wait for system to be reachable
      wait_for_connection:
        delay: 5
        timeout: 120

    - name: Gather OS facts
      setup:
        filter:
          - ansible_distribution*
          - ansible_os_family
          - ansible_architecture
          - ansible_memtotal_mb

    - name: Fail on unsupported OS
      fail:
        msg: "Unsupported OS: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"
      when: ansible_facts['distribution'] not in ["Amazon", "Amazon Linux"]

  roles:
    - role: docker
      tags: [docker]

    - role: foreman
      tags: [foreman]

  post_tasks:
    - name: Verify Foreman is running
      uri:
        url: http://localhost:8080/healthz
        method: GET
        status_code: 200
      register: healthcheck
      retries: 10
      delay: 3
      until: healthcheck.status == 200
      ignore_errors: yes

    - name: Diagnose health check failure
      when: healthcheck is failed
      block:
        - name: Check systemd status
          command: systemctl status foreman --no-pager -l
          register: systemd_status
          ignore_errors: yes

        - name: Show systemd status
          debug:
            var: systemd_status.stdout_lines

        - name: Check Docker container logs
          command: docker logs foreman 2>&1
          register: docker_logs
          ignore_errors: yes

        - name: Show Docker logs
          debug:
            var: docker_logs.stdout_lines

        - name: Check if container is running
          command: docker ps -a --filter name=foreman --format '{{ "{{" }}.Names{{ "}}" }} {{ "{{" }}.Status{{ "}}" }}'
          register: docker_ps
          ignore_errors: yes

        - name: Show container status
          debug:
            var: docker_ps.stdout_lines

        - name: Fail with diagnostic info
          fail:
            msg: "Foreman health check failed. See diagnostics above."

    - name: Display Foreman status
      when: healthcheck is success
      debug:
        msg:
          - "Foreman is running and healthy!"
          - "API: http://{{ ansible_default_ipv4.address }}:8080"
          - "Health: http://{{ ansible_default_ipv4.address }}:8080/healthz"
