---
# Foreman Ansible Inventory
#
# Usage:
#   ansible-playbook -i inventory.yml playbook.yml
#
# Or use the dynamic inventory script:
#   ansible-playbook -i ../terraform-inventory.py playbook.yml

all:
  hosts:
    foreman:
      ansible_host: "{{ lookup('env', 'FOREMAN_HOST') | default('localhost', true) }}"
      ansible_user: ec2-user
      ansible_ssh_private_key_file: "{{ lookup('env', 'FOREMAN_SSH_KEY') | default('~/.ssh/id_ed25519', true) }}"
  vars:
    # Default to localhost for testing; override via FOREMAN_HOST env var
    ansible_connection: "{{ 'ssh' if lookup('env', 'FOREMAN_HOST') else 'local' }}"
