---
# Foreman configuration and deployment role

- name: Create Foreman directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ foreman_config_dir }}"
    - "{{ foreman_data_dir }}"

- name: Create environment file with signing key
  template:
    src: env.j2
    dest: "{{ foreman_config_dir }}/env"
    mode: "0600"
  notify: restart foreman

- name: Deploy Foreman configuration
  template:
    src: foreman.yaml.j2
    dest: "{{ foreman_config_dir }}/foreman.yaml"
    mode: "0644"
  notify: restart foreman

- name: Deploy Foreman systemd service
  template:
    src: foreman.service.j2
    dest: /etc/systemd/system/foreman.service
    mode: "0644"
  notify: reload systemd

- name: Log in to GHCR (if token provided)
  docker_login:
    registry_url: "{{ foreman_image.split('/')[0] }}"
    username: "{{ ghcr_username | default('', true) }}"
    password: "{{ ghcr_token | default('', true) }}"
  when: ghcr_token | default('') | length > 0

- name: Pull Foreman Docker image
  docker_image:
    name: "{{ foreman_image }}"
    source: pull
    force_source: yes
  register: pull_result
  retries: 3
  delay: 5
  until: pull_result is success
  notify: restart foreman

- name: Flush handlers to apply config changes before starting
  meta: flush_handlers

- name: Enable and start Foreman
  systemd:
    name: foreman
    state: started
    enabled: yes
    # NOTE: no daemon_reload here -- the restart handler above already ran it.
    # A second daemon-reload can cause systemd to restart the service on some
    # versions, making it briefly unavailable for the post_task health check.

- name: Wait for Foreman to be healthy
  uri:
    url: "http://localhost:{{ foreman_api_port }}/healthz"
    method: GET
    status_code: 200
  register: healthcheck
  retries: 15
  delay: 4
  until: healthcheck.status == 200
  ignore_errors: yes

- name: Diagnose health check failure
  when: healthcheck is failed
  block:
    - name: Check systemd status
      command: systemctl status foreman --no-pager -l
      register: systemd_status
      ignore_errors: yes

    - name: Show systemd unit status
      debug:
        var: systemd_status.stdout_lines

    - name: Check systemd journal for Foreman logs
      command: journalctl -u foreman --no-pager -n 50
      register: journal_logs
      ignore_errors: yes

    - name: Show journal logs
      debug:
        var: journal_logs.stdout_lines

    - name: Check Docker container logs
      shell: docker logs foreman 2>&1 || true
      register: docker_logs
      ignore_errors: yes

    - name: Show Docker logs
      debug:
        var: docker_logs.stdout_lines

    - name: Show Docker container states
      vars:
        fmt: !unsafe 'table {{.Names}}\t{{.Status}}\t{{.ExitCode}}\t{{.CreatedAt}}'
      shell: "docker ps -a --filter name=foreman --format '{{ fmt }}'"
      register: docker_ps
      ignore_errors: yes

    - name: Show container status
      debug:
        var: docker_ps.stdout_lines

    - name: Check container exit details
      vars:
        fmt: !unsafe 'ExitCode={{.State.ExitCode}} Status={{.State.Status}} Error={{.State.Error}}'
      shell: "docker inspect foreman --format '{{ fmt }}'"
      register: docker_inspect
      ignore_errors: yes

    - name: Show container exit details
      when: docker_inspect is success
      debug:
        var: docker_inspect.stdout_lines

    - name: Show rendered foreman.yaml (DSN masked)
      shell: "sed 's/dsn: .*/dsn: ***MASKED***/' /opt/foreman/config/foreman.yaml"
      register: rendered_config
      ignore_errors: yes

    - name: Show rendered config
      debug:
        var: rendered_config.stdout_lines

    - name: Check env file
      command: cat /opt/foreman/config/env
      register: env_file
      ignore_errors: yes

    - name: Show env file
      debug:
        var: env_file.stdout_lines

    - name: Show systemd service file
      command: cat /etc/systemd/system/foreman.service
      register: service_file
      ignore_errors: yes

    - name: Show service file
      debug:
        var: service_file.stdout_lines

    - name: Check Docker host connectivity
      command: docker info
      register: docker_info
      ignore_errors: yes

    - name: Show Docker info status
      debug:
        msg: "Docker daemon reachable: {{ docker_info is success }}"

    - name: Check if foreman image exists
      vars:
        fmt: !unsafe '{{.Repository}}:{{.Tag}} ({{.Size}})'
      shell: "docker images ghcr.io/assahbismarkabah/foreman --format '{{ fmt }}'"
      register: foreman_image_check
      ignore_errors: yes

    - name: Show foreman image status
      debug:
        var: foreman_image_check.stdout_lines

    - name: Fail with all diagnostic info collected
      fail:
        msg: "Foreman health check failed after 15 attempts. See diagnostics above for details."
  always:
    - name: Ensure we fail the task
      fail:
        msg: "Health check failed"
      when: healthcheck is failed

- name: Verify health check passed
  assert:
    that:
      - healthcheck is success
    fail_msg: "Health check did not pass (diagnostics above)"

- name: Display Foreman info
  debug:
    msg:
      - "Foreman {{ foreman_version }} deployed successfully"
      - "Config: {{ foreman_config_dir }}/foreman.yaml"
      - "API: http://localhost:{{ foreman_api_port }}"
      - "Health: http://localhost:{{ foreman_api_port }}/healthz"
