---
# Docker installation role for Ubuntu 24.04 (ARM64)

- name: Install Docker dependencies
  apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: yes

- name: Add Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /usr/share/keyrings/docker-archive-keyring.gpg
    mode: "0644"

- name: Add Docker repository
  deb822_repository:
    name: docker
    types: [deb]
    uris: https://download.docker.com/linux/ubuntu
    suites: noble
    components: [stable]
    architectures: arm64
    signed_by: /usr/share/keyrings/docker-archive-keyring.gpg
    state: present

- name: Install Docker packages
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
      - jq
      - git
    state: present
    update_cache: yes

- name: Start and enable Docker
  systemd:
    name: docker
    state: started
    enabled: yes
    daemon_reload: yes

- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes

- name: Verify Docker is working
  command: docker info
  register: docker_info
  changed_when: false
  failed_when: docker_info.rc != 0

- name: Display Docker version
  debug:
    msg: "Docker {{ docker_info.stdout_lines | select('match', '^Server Version:') | first | default('unknown') }}"
