---
# Docker installation role
# Supports Ubuntu 24.04 (full installation via apt)
# and Amazon Linux 2023 (Docker pre-installed, just ensure running)

- name: Include OS-specific tasks
  include_tasks: "{{ 'Amazon' if ansible_facts['distribution'] in ['Amazon', 'Amazon Linux'] else ansible_facts['distribution'] }}.yml"

- name: Start and enable Docker
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Add default user to docker group
  user:
    name: "{{ 'ec2-user' if ansible_facts['distribution'] in ['Amazon', 'Amazon Linux'] else 'ubuntu' }}"
    groups: docker
    append: yes

- name: Verify Docker is working
  command: docker info
  register: docker_info
  changed_when: false
  failed_when: docker_info.rc != 0

- name: Display Docker version
  debug:
    msg: "Docker {{ docker_info.stdout_lines | select('match', '^Server Version:') | first | default('unknown') }}"
