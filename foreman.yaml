# Foreman Configuration
#
# Environment variables override YAML values at runtime.
# See .env.example for all available options.

subsystems:
  # --- Event Bus ---
  # kind: "memory" (in-process, no deps) or "nats" (JetStream)
  #   nats without url = embedded NATS server (dev)
  #   nats with url = external NATS cluster (prod)
  eventbus:
    kind: memory
    # url: nats://localhost:4222

  # --- State Store (PostgreSQL) ---
  # Start with: make up (or: docker compose -f deploy/docker-compose.yml up -d)
  # The DSN can be overridden via the FOREMAN_PG_DSN env var or
  # the FOREMAN_PG_* individual env vars.
  statestore:
    kind: postgres
    dsn: "postgres://foreman:foreman@localhost:5432/foreman?sslmode=disable"
    max_connections: 25
    min_connections: 5

  # --- Sandbox ---
  sandbox:
    kind: docker
    image: ubuntu:22.04

  # --- Coordinator ---
  coordinator:
    max_concurrent: 5
    default_timeout: 5m

  # --- Agents ---
  # The first agent in the list is used for task execution.
  # For production, configure an LLM agent (opencode, claude-code, etc.).
  # For testing, the "exec" agent runs shell commands directly.
  agents:
    - name: exec
      kind: exec
      cmd: sh
      cwd: /workspace
      heartbeat_timeout: 60s
    - name: opencode
      kind: opencode
      cmd: npx opencode
      cwd: /tmp/opencode-workspace
      heartbeat_interval: 30s
      heartbeat_timeout: 90s

  # --- Communication Plugins ---
  # Slack plugin uses Socket Mode (WebSocket). No public endpoint needed.
  # Set up a Slack App with:
  #   - Socket Mode enabled
  #   - Bot Token (xoxb-*) with chat:write, commands scopes
  #   - App-Level Token (xapp-*) with connections:write scope
  #   - Slash command: /foreman
  #   - Subscribe to: app_mention, message.im
  # plugins:
  #   slack:
  #     bot_token: ${SLACK_BOT_TOKEN}
  #     app_token: ${SLACK_APP_TOKEN}
  #     signing_secret: ${SLACK_SIGNING_SECRET}
  # Discord plugin uses the Gateway API (WebSocket). No public endpoint needed.
  # Set up a Discord App with:
  #   - Bot with Message Content Intent enabled
  #   - Slash command: /foreman
  #   - Bot token from Discord Developer Portal
  #   discord:
  #     bot_token: ${DISCORD_BOT_TOKEN}

  # --- Identity ---
  # The API server always starts (provides /healthz). JWT/OIDC features need
  # the signing key to be set via the FOREMAN_SIGNING_KEY env var.
  identity:
    api:
      listen_addr: ":8080"
      public_url: "http://localhost:8080"
    signing_key:
      source: env                    # "env" or "file"
      env_var_name: FOREMAN_SIGNING_KEY
      key_id: foreman-1
      # file_path: /etc/foreman/key.pem  # if source: file
    # GitHub App integration (optional, needs app credentials)
    # github_app:
    #   app_id: 123456
    #   private_key_path: /etc/foreman/github-app.pem
    #   webhook_secret: "your-webhook-secret"

  # --- MCP Hub ---
  mcphub:
    servers:
      - name: filesystem
        transport: stdio
        command: npx
        args:
          - "@modelcontextprotocol/server-filesystem"
          - /tmp
