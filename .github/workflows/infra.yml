# =============================================================================
# Infrastructure CI/CD Pipeline
#
# Automatically provisions and configures Foreman infrastructure on AWS.
#
# Triggers:
#   - Push to infra/ directory on main branch
#   - Manual trigger (workflow_dispatch)
#
# Pipeline stages:
#   1. Validate: Terraform fmt + validate
#   2. Plan:     Terraform plan (dry run)
#   3. Apply:    Terraform apply (provision EC2 + networking)
#   4. Config:   Ansible playbook (configure Docker + Foreman)
#   5. Verify:   Health check against Foreman API
# =============================================================================

name: Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
      terraform_action:
        description: "Terraform action"
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan

env:
  TF_VERSION: "1.9"
  AWS_REGION: "us-east-1"
  TF_VAR_foreman_pg_dsn: ${{ secrets.FOREMAN_PG_DSN }}
  TF_VAR_foreman_signing_key: ${{ secrets.FOREMAN_SIGNING_KEY }}
  TF_VAR_slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
  TF_VAR_slack_app_token: ${{ secrets.SLACK_APP_TOKEN }}
  TF_VAR_discord_bot_token: ${{ secrets.DISCORD_BOT_TOKEN }}
  TF_VAR_ghcr_token: ${{ secrets.GITHUB_TOKEN }}
  # TF_VAR_ssh_public_key is set dynamically in plan/apply jobs from SSH_PRIVATE_KEY

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -diff
        continue-on-error: true

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  plan:
    name: Terraform Plan
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup SSH public key for Terraform
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub
          echo "TF_VAR_ssh_public_key=$(cat ~/.ssh/id_ed25519.pub)" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap Terraform state backend
        run: |
          # Create S3 bucket if it doesn't exist
          aws s3api create-bucket \
            --bucket foreman-terraform-state-571075516563 \
            --region us-east-1 2>/dev/null || echo "Bucket already exists"
          aws s3api put-bucket-versioning \
            --bucket foreman-terraform-state-571075516563 \
            --versioning-configuration Status=Enabled 2>/dev/null || true
          # Create DynamoDB lock table if it doesn't exist
          aws dynamodb create-table \
            --table-name foreman-terraform-locks \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST 2>/dev/null && echo "Lock table created" || echo "Lock table already exists"

      - name: Terraform init
        run: terraform init

      - name: Clear stale state lock
        run: |
          aws dynamodb delete-item \
            --table-name foreman-terraform-locks \
            --key '{"LockID": {"S": "foreman-terraform-state-571075516563/infra/terraform.tfstate"}}' \
            2>/dev/null || true
          echo "Stale lock cleared (if any)."

      - name: Terraform plan
        run: |
          # Secrets are passed via TF_VAR_* env vars (set in workflow env block).
          # No -var-file needed in CI since terraform.tfvars is not committed.
          terraform plan \
            -out=tfplan \
            -no-color
        continue-on-error: false

      - name: Upload plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: infra/terraform/tfplan
          retention-days: 7

  apply:
    name: Terraform Apply
    needs: plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'apply'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      instance_ip: ${{ steps.save_outputs.outputs.instance_ip }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          # Disable wrapper to avoid "Error: Terraform exited with code 1." noise
          # from the wrapper mixing stdout/stderr (hashicorp/setup-terraform#405)
          terraform_wrapper: false

      - name: Setup SSH public key for Terraform
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub
          echo "TF_VAR_ssh_public_key=$(cat ~/.ssh/id_ed25519.pub)" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap Terraform state backend
        run: |
          aws s3api create-bucket \
            --bucket foreman-terraform-state-571075516563 \
            --region us-east-1 2>/dev/null || echo "Bucket already exists"
          aws s3api put-bucket-versioning \
            --bucket foreman-terraform-state-571075516563 \
            --versioning-configuration Status=Enabled 2>/dev/null || true
          aws dynamodb create-table \
            --table-name foreman-terraform-locks \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST 2>/dev/null && echo "Lock table created" || echo "Lock table already exists"

      - name: Terraform init
        run: terraform init

      - name: Clear stale state lock
        run: |
          aws dynamodb delete-item \
            --table-name foreman-terraform-locks \
            --key '{"LockID": {"S": "foreman-terraform-state-571075516563/infra/terraform.tfstate"}}' \
            2>/dev/null || true
          echo "Stale lock cleared (if any)."

      - name: Import existing resources into state
        run: |
          # Get resources already in Terraform state (empty on first run)
          ALREADY_IN_STATE=$(terraform state list 2>/dev/null || true)
          # Import key pair if it exists in AWS but not in state
          if aws ec2 describe-key-pairs --key-names foreman-dev-key &>/dev/null; then
            if ! echo "$ALREADY_IN_STATE" | grep -qx "aws_key_pair.foreman"; then
              terraform import aws_key_pair.foreman foreman-dev-key || true
            fi
          fi
          # Import security group if it exists in AWS but not in state
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=foreman-dev-sg" \
            --query 'SecurityGroups[0].GroupId' \
            --output text 2>/dev/null)
          if [ "$SG_ID" != "None" ] && [ -n "$SG_ID" ]; then
            if ! echo "$ALREADY_IN_STATE" | grep -qx "aws_security_group.foreman"; then
              terraform import aws_security_group.foreman "$SG_ID" || true
            fi
          fi

      - name: Terraform plan and apply
        run: |
          terraform plan -out=tfplan -no-color
          terraform apply tfplan -no-color

      - name: Save outputs
        id: save_outputs
        run: |
          IP=$(terraform output -raw instance_public_ip)
          echo "instance_ip=$IP" >> $GITHUB_OUTPUT
          echo "INSTANCE_IP=$IP" >> $GITHUB_ENV

      - name: Wait for instance to be ready
        run: |
          INSTANCE_ID=$(terraform output -raw instance_id)
          echo "Waiting for instance $INSTANCE_ID..."
          aws ec2 wait instance-status-ok --instance-ids "$INSTANCE_ID"
          echo "Instance status checks passed."

      - name: Verify public IP is reachable
        run: |
          IP=$(terraform output -raw instance_public_ip)
          echo "Instance public IP: $IP"
          echo "INSTANCE_IP=$IP" >> $GITHUB_ENV
          # Verify the IP is actually pingable (or at least has a route)
          for i in $(seq 1 6); do
            if ping -c 1 -W 5 "$IP" &>/dev/null; then
              echo "Instance is reachable on the network."
              break
            fi
            if [ "$i" -eq 6 ]; then
              echo "Warning: Instance not responding to ping (may still be booting)"
            fi
            echo "Waiting for network reachability... attempt $i"
            sleep 10
          done

  configure:
    name: Ansible Configure
    needs: apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/ansible

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install ansible
          ansible-galaxy collection install community.docker

      - name: Wait for SSH and add host to known_hosts
        run: |
          IP="${{ needs.apply.outputs.instance_ip }}"
          echo "Waiting for SSH on $IP:22..."
          mkdir -p ~/.ssh
          for i in $(seq 1 30); do
            # Check if port 22 is open first
            if nc -zv -w5 "$IP" 22 2>&1; then
              # Port is open, try ssh-keyscan
              if ssh-keyscan -H "$IP" >> ~/.ssh/known_hosts 2>&1; then
                echo "SSH ready after $((i * 10))s"
                break
              fi
            fi
            if [ "$i" -eq 30 ]; then
              echo "SSH not ready after 300s, aborting"
              echo "Debug: checking instance reachability..."
              curl -s -m 5 "http://$IP:8080/healthz" || echo "Health endpoint not reachable"
              echo "Debug: traceroute to $IP..."
              traceroute -m 5 "$IP" 2>&1 || true
              exit 1
            fi
            echo "Attempt $i: SSH not ready yet, retrying in 10s..."
            sleep 10
          done

      - name: Setup SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Run Ansible playbook
        env:
          FOREMAN_PG_DSN: ${{ secrets.FOREMAN_PG_DSN }}
          FOREMAN_SIGNING_KEY: ${{ secrets.FOREMAN_SIGNING_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ansible-playbook \
            -i inventory.yml \
            -e "@vars/production.yml" \
            -e "foreman_pg_dsn=$FOREMAN_PG_DSN" \
            -e "foreman_signing_key=$FOREMAN_SIGNING_KEY" \
            -e "slack_bot_token=$SLACK_BOT_TOKEN" \
            -e "slack_app_token=$SLACK_APP_TOKEN" \
            -e "discord_bot_token=$DISCORD_BOT_TOKEN" \
            -e "ghcr_username=$GHCR_USERNAME" \
            -e "ghcr_token=$GHCR_TOKEN" \
            playbook.yml

  verify:
    name: Verify Deployment
    needs: [apply, configure]
    runs-on: ubuntu-latest

    steps:
      - name: Check Foreman health endpoint
        id: healthcheck
        run: |
          IP="${{ needs.apply.outputs.instance_ip }}"
          echo "IP=$IP" >> $GITHUB_OUTPUT
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://${IP}:8080/healthz" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Foreman is healthy!"
              echo "healthy=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 5s..."
            sleep 5
          done
          echo "healthy=false" >> $GITHUB_OUTPUT
          echo "Foreman health check failed after 10 attempts"
          exit 1

      - name: SSH diagnostics on failure
        if: failure()
        run: |
          IP="${{ steps.healthcheck.outputs.IP }}"

          # Setup SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Accept host key
          ssh-keyscan -H "$IP" >> ~/.ssh/known_hosts 2>/dev/null || true

          SSH="ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=no ec2-user@$IP"

          echo "=== 1. Container status ==="
          $SSH "docker ps -a --filter name=foreman"

          echo ""
          echo "=== 2. Foreman service status ==="
          $SSH "systemctl status foreman --no-pager -l 2>&1 || true"

          echo ""
          echo "=== 3. Journal logs (last 100) ==="
          $SSH "journalctl -u foreman --no-pager -n 100 2>&1 || true"

          echo ""
          echo "=== 4. Docker logs ==="
          $SSH "docker logs foreman 2>&1 || echo 'No logs available (container may not exist)'"

          echo ""
          echo "=== 5. Listening on port 8080 ==="
          $SSH "ss -tlnp | grep 8080 || echo 'Nothing listening on port 8080'"

          echo ""
          echo "=== 6. firewalld status ==="
          $SSH "systemctl is-active firewalld 2>/dev/null || echo 'firewalld not active'"

          echo ""
          echo "=== 7. Docker info ==="
          $SSH "docker info --format '{{.ServerVersion}}' 2>&1 || echo 'Docker not available'"

      - name: Display deployment summary
        if: success()
        run: |
          IP="${{ needs.apply.outputs.instance_ip }}"
          echo "=========================================="
          echo "  Foreman Deployment Complete"
          echo "=========================================="
          echo "  Instance IP: $IP"
          echo "  API:         http://${IP}:8080"
          echo "  Health:      http://${IP}:8080/healthz"
          echo "=========================================="

  destroy:
    name: Terraform Destroy
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'destroy'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SSH public key for Terraform
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub
          echo "TF_VAR_ssh_public_key=$(cat ~/.ssh/id_ed25519.pub)" >> $GITHUB_ENV

      - name: Bootstrap Terraform state backend
        run: |
          aws s3api create-bucket \
            --bucket foreman-terraform-state-571075516563 \
            --region us-east-1 2>/dev/null || echo "Bucket already exists"
          aws s3api put-bucket-versioning \
            --bucket foreman-terraform-state-571075516563 \
            --versioning-configuration Status=Enabled 2>/dev/null || true
          aws dynamodb create-table \
            --table-name foreman-terraform-locks \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST 2>/dev/null && echo "Lock table created" || echo "Lock table already exists"

      - name: Terraform init
        run: terraform init

      - name: Clear stale state lock
        run: |
          aws dynamodb delete-item \
            --table-name foreman-terraform-locks \
            --key '{"LockID": {"S": "foreman-terraform-state-571075516563/infra/terraform.tfstate"}}' \
            2>/dev/null || true
          echo "Stale lock cleared (if any)."

      - name: Terraform destroy
        run: |
          terraform destroy \
            -auto-approve \
            -no-color
        continue-on-error: true

      - name: Force unlock state (clean up after destroy)
        if: always()
        run: |
          LOCK_ID=$(aws dynamodb get-item \
            --table-name foreman-terraform-locks \
            --key '{"LockID": {"S": "foreman-terraform-state-571075516563/infra/terraform.tfstate"}}' \
            --query 'LockID.S' \
            --output text 2>/dev/null || echo "")
          if [ -n "$LOCK_ID" ] && [ "$LOCK_ID" != "None" ]; then
            terraform force-unlock -force "$LOCK_ID" 2>/dev/null || true
          fi
          # Also delete the lock item directly
          aws dynamodb delete-item \
            --table-name foreman-terraform-locks \
            --key '{"LockID": {"S": "foreman-terraform-state-571075516563/infra/terraform.tfstate"}}' \
            2>/dev/null || true
          echo "State lock cleaned up."
