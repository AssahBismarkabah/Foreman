name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: foreman
          POSTGRES_PASSWORD: foreman
          POSTGRES_DB: foreman_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U foreman -d postgres"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Cache opencode
        id: cache-opencode
        uses: actions/cache@v4
        with:
          path: ~/.opencode/bin
          key: opencode-${{ runner.os }}-1.17.18

      - name: Install opencode
        if: steps.cache-opencode.outputs.cache-hit != 'true'
        run: curl -fsSL https://opencode.ai/install | bash -s -- --version 1.17.18 --no-modify-path

      - name: Add opencode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - run: make build

      - name: Run tests
        run: go test -count=1 -p 1 $(go list ./... | grep -v test/e2e)
        env:
          FOREMAN_TEST_DATABASE_URL: postgres://foreman:foreman@localhost:5432/foreman_test?sslmode=disable

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run E2E test
        run: go test -count=1 -v -timeout 180s ./test/e2e/
