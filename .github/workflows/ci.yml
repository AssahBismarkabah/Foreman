name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - run: make build
      - run: make test

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12